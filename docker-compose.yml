services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: normx-legal-api
    restart: unless-stopped
    environment:
      PORT: "3004"
      DATABASE_URL: "postgresql://normxlegal:X0MhDPJYie1SjTQSz6Ja1KuXIvFWBm27cAJwSN0r@postgres:5432/normxlegal?schema=public"
      QDRANT_URL: "http://cgi242-qdrant:6333"
    expose:
      - "3004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - normx-legal-net
      - cgi242_cgi242-net
    volumes:
      - generated_docs:/app/generated

  postgres:
    image: postgres:16-alpine
    container_name: normx-legal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: normxlegal
      POSTGRES_USER: normxlegal
      POSTGRES_PASSWORD: X0MhDPJYie1SjTQSz6Ja1KuXIvFWBm27cAJwSN0r
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normxlegal"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - normx-legal-net

volumes:
  pgdata:
  generated_docs:

networks:
  normx-legal-net:
    driver: bridge
  cgi242_cgi242-net:
    external: true
