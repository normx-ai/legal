# ==========================================
# NORMX Legal — Docker Compose Production
# ==========================================

services:
  # --- Backend API ---
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: normx-legal-api
    restart: unless-stopped
    env_file: ./server/.env.production
    environment:
      - PORT=3004
      - DATABASE_URL=postgresql://normxlegal:${POSTGRES_PASSWORD}@postgres:5432/normxlegal?schema=public
      - QDRANT_URL=http://cgi242-qdrant:6333
    expose:
      - "3004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - normx-legal-net
      - cgi242_cgi242-net
    volumes:
      - generated_docs:/app/generated
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: normx-legal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: normxlegal
      POSTGRES_USER: normxlegal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normxlegal"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - normx-legal-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx géré par cgi242-nginx (reverse proxy partagé VPS)
  # Qdrant unifié : cgi242-qdrant v1.17.0 (réseau cgi242_cgi242-net)
  # Collection: ohada_guide (986 chunks)

volumes:
  pgdata:
  generated_docs:

networks:
  normx-legal-net:
    driver: bridge
  cgi242_cgi242-net:
    external: true
