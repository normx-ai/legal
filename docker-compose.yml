services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: normx-legal-api
    restart: unless-stopped
    env_file: ./server/.env.production
    expose:
      - "3004"
    depends_on:
      legal-postgres:
        condition: service_healthy
    networks:
      - normx-legal-net
      - cgi242_cgi242-net
    volumes:
      - generated_docs:/app/generated

  legal-postgres:
    image: postgres:16-alpine
    container_name: normx-legal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: normxlegal
      POSTGRES_USER: normxlegal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normxlegal"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - normx-legal-net

volumes:
  pgdata:
  generated_docs:

networks:
  normx-legal-net:
    driver: bridge
  cgi242_cgi242-net:
    external: true
