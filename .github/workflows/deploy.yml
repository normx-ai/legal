name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 51.83.75.203
  VPS_USER: ubuntu
  APP_DIR: /opt/legal

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies & build frontend
        run: |
          cd mobile
          npm install --legacy-peer-deps
          EXPO_PUBLIC_API_URL=/api npx expo export --platform web
          cp assets/favicon.png dist/favicon.ico
          cp assets/favicon.png dist/favicon.png
          cd ..

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload frontend build
        run: |
          rsync -az --delete mobile/dist/ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.APP_DIR }}/server/public/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}

            git checkout -- .
            git pull origin main

            # server/.env.production — hostnames adaptes au compose infra
            cat > server/.env.production << ENVEOF
            NODE_ENV=production
            PORT=3004
            DATABASE_URL=postgresql://normxlegal:${{ secrets.POSTGRES_PASSWORD }}@legal-db:5432/normxlegal?schema=public
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
            QDRANT_URL=http://qdrant:6333
            CORS_ORIGIN=https://legal.normx-ai.com,https://normx-ai.com
            KEYCLOAK_URL=https://auth.normx-ai.com
            KEYCLOAK_REALM=normx
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=465
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=no-reply@normx-ai.com
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ENVEOF
            chmod 600 server/.env.production

            # Rebuild normx-legal-api via le compose infra
            cd /opt/infra
            sudo docker compose up -d --build normx-legal-api

            sleep 15
            curl -sf https://legal.normx-ai.com/health || echo "WARN: Health check failed"

            echo "Deploiement legal termine avec succes"
