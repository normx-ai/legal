name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 51.83.75.203
  VPS_USER: ubuntu
  APP_DIR: /opt/normx-legal

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}

            git pull origin main

            # --- Generer docker-compose .env ---
            cat > .env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ENVEOF
            chmod 600 .env

            # --- Generer server/.env.production ---
            cat > server/.env.production << 'ENVEOF'
            NODE_ENV=production
            PORT=3004
            DATABASE_URL=postgresql://normxlegal:${{ secrets.POSTGRES_PASSWORD }}@legal-postgres:5432/normxlegal?schema=public
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
            QDRANT_URL=http://cgi242-qdrant:6333
            CORS_ORIGIN=https://legal.normx-ai.com,https://normx-ai.com
            KEYCLOAK_URL=https://auth.normx-ai.com
            KEYCLOAK_REALM=normx
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=465
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=no-reply@normx-ai.com
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ENVEOF
            chmod 600 server/.env.production

            # --- Build frontend web ---
            cd mobile && rm -rf node_modules && npm install && npm run build:web && cd ..

            # --- Copier le build frontend ---
            sudo rm -rf nginx/dist
            cp -r mobile/dist nginx/dist
            # Aussi dans server/public pour que l'API serve le SPA
            rm -rf server/public
            cp -r mobile/dist server/public

            # --- Rebuild et restart ---
            docker compose build --no-cache api
            docker compose up -d --remove-orphans

            # --- Verifier ---
            sleep 15
            curl -sf http://localhost:3004/health || echo "WARN: Health check failed"

            echo "Deploiement Legal termine avec succes"
