upstream api_backend {
    server api:3004;
}

server {
    listen 80;
    server_name _;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/legal.normx.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/legal.normx.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Generated files
    location /files/ {
        alias /var/www/files/;
        add_header Content-Disposition "attachment";
    }

    # Health check
    location /health {
        proxy_pass http://api_backend;
    }

    # SPA — no cache for index.html
    location /index.html {
        root /var/www/normx-legal;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Static assets — long cache
    location /_expo/static/ {
        root /var/www/normx-legal;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        root /var/www/normx-legal;
        try_files $uri /index.html;
    }
}
